<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback · Assistance à distance · Guichet Self-service</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="app">
      <section class="hero">
        <div class="hero-panel">
          <img src="assets/bpost-logo.png" alt="bpost" class="bpost-logo">
          <div class="kicker"><span></span><strong>FEEDBACK</strong></div>
          <h1>Assistance à distance</h1>
          <p class="service">Guichet Self-service</p>
          <div class="hero-line"></div>
          <p class="pilot">Pilote télé-guichet<br>Cluster Liège</p>
        </div>
        <div class="hero-photo" aria-label="Télé-guichet"></div>
      </section>

      <section class="content">
        <header class="intro">
          <h2>ONE TEAM · NOUS AGISSONS ENSEMBLE</h2>
          <p>Votre retour nous aide à améliorer l’outil, les connexions et l’expérience au guichet self.</p>
        </header>

        <form id="feedbackForm">
          <div class="field">
            <label for="bureau">Vous êtes situés dans quel bureau ?</label>
            <select id="bureau" name="bureau" required>
              <option value="" selected disabled>Sélectionnez votre bureau</option>
              <option>Ans</option>
              <option>Flémalle-Haute</option>
              <option>Fléron</option>
              <option>Herstal</option>
              <option>Liège Avroy</option>
              <option>Liège Grétry</option>
              <option>Liège Perron</option>
              <option>Seraing</option>
              <option>Visé</option>
            </select>
          </div>

          <div class="field">
            <label for="typeRetour">Type de retour</label>
            <select id="typeRetour" name="typeRetour" required>
              <option value="" selected disabled>Sélectionnez le type de retour</option>
              <option>Problème de connexion</option>
              <option>Difficulté rencontrée</option>
              <option>Idée d’amélioration</option>
              <option>Bonne pratique</option>
              <option>Autre</option>
            </select>
          </div>

          <div class="field">
            <label for="commentaire">Votre commentaire</label>
            <textarea id="commentaire" name="commentaire" rows="4" placeholder="Décrivez brièvement votre retour…" required></textarea>
          </div>

          <button type="submit" id="submitButton"><span class="send-icon">➤</span> Envoyer mon feedback</button>
        </form>
        <div id="message" class="message" hidden></div>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
