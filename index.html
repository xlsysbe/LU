<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback · Assistance à distance · Guichet Self-service</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="app">
      <section class="hero">
        <div class="hero-red">
          <img src="assets/bpost-logo.png" alt="bpost" class="bpost-logo">

          <div class="kicker">
            <span class="kicker-line"></span>
            <strong>FEEDBACK</strong>
          </div>

          <h1>Assistance à distance</h1>
          <p class="service">Guichet Self-service</p>

          <div class="hero-line"></div>

          <p class="pilot">Pilote guichet à distance	<br>Cluster Liège</p>
          <p class="hero-note"></p>
        </div>

        <div class="hero-image" aria-label="Télé-guichet"></div>
      </section>

      <section class="content">
        <header class="intro">
          <h2>
            <img src="assets/one-team.svg" class="team-icon" alt="">
            ONE TEAM · NOUS AGISSONS ENSEMBLE
          </h2>
          <p>Votre retour nous aide à améliorer l’outil, les connexions et l’expérience du client avec l'assistance à distance.</p>
        </header>

        <form id="feedbackForm">
          <div class="field">
            <label for="bureau">Vous êtes situés dans quel bureau ?</label>
            <select id="bureau" name="bureau" required>
              <option value="" selected disabled>Sélectionnez votre bureau</option>
              <option>Ans Montfort</option>
              <option>Flémalle-Haute</option>
              <option>Fléron</option>
              <option>Herstal</option>
              <option>Liège Avroy</option>
              <option>Liège Grétry</option>
              <option>Liège Perron</option>
              <option>Seraing Bas</option>
              <option>Rocourt Reine Astrid</option>
              <option>Visé</option>
            </select>
          </div>

          <div class="field">
            <label for="typeRetour">Type de feedback</label>
            <select id="typeRetour" name="typeRetour" required>
              <option value="" selected disabled>Sélectionnez le type de retour</option>
              <option>Problème de connexion</option>
              <option>Difficulté rencontrée</option>
              <option>Idée d’amélioration</option>
              <option>Bonne pratique</option>
              <option>Autre</option>
            </select>
          </div>

          <div class="field">
            <label for="commentaire">Votre commentaire</label>
            <textarea id="commentaire" name="commentaire" rows="3" placeholder="Décrivez brièvement votre feedback…" required></textarea>
          </div>

          <button type="submit" id="submitButton">
            <img src="assets/send.svg" class="send-icon" alt="">
            Envoyer mon feedback
          </button>
        </form>

        <div id="message" class="message" hidden></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
